
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>casos covid 19</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="contenido-encabezado">
            <h1>Casos covid 19</h1>
            <p>Monitoreo de casos a nivel mundial</p>
        </div>
    </header>

    <nav class="navegacion-fija">
        <div class="contenedor-busqueda">
            <img src="manos.png" class="microbio-animado" alt="Virus">
            <div class="entrada-busqueda">
                <input type="text" id="idEntradaBusqueda" placeholder=" Escribe el nombre de un país..." autocomplete="off">
            </div>
        </div>
        <div id="idBotonesFiltro" class="botones-filtro"></div>
    </nav>

    <main class="contenedor-principal">
        <div id="idCargador" class="cargador oculto">
            <div class="rueda-progreso"></div>
        </div>
        <section id="idContenedorResultados" class="cuadricula-contenedor"></section>
    </main>

    <div id="idModalRaiz" class="capa-modal oculto">
        <div class="caja-modal">
            <span id="idCerrarModal" class="boton-cerrar">&times;</span>
            <div id="idContenidoModal"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
